<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>List of Places</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon -->
    <link rel="icon" href="images/icon.png">
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- Logo -->
        <img src="images/logo.png" class="logo" alt="Logo">

        <!-- Navigation -->
        <nav>
            <a href="index.html">Home</a>
            <!-- Added an id to the login link for JS to show/hide based on authentication -->
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <!--  MAIN  -->
    <main>

        <!-- Optional Filter Section -->
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="">No Limit</option>
                <option value="50">$50</option>
                <option value="100">$100</option>
                <option value="200">$200</option>
                <option value="500">$500</option>
            </select>
        </section>

        <!-- PLACES LIST -->
        <!-- This section will be populated dynamically by script.js -->
        <!-- Removed static place cards as per exercise instructions -->
        <section id="places-list">
            <!-- Dynamic content will be appended here -->
        </section>


    </main>

    <!--  FOOTER  -->
    <footer>
        <p>All rights reserved</p>
    </footer>

    <!-- Scripts -->
    <!-- Added script.js that handles fetching places and filtering -->
    <script src="scripts.js"></script>
</body>
</html>
