<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <img src="../doc_images/" class="logo" alt="Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section class="add-review">
            <!-- Identify which place is being reviewed -->
            <h2>Add a Review for <span id="place-name">Place Name</span></h2>
            
            <form id="review-form">
                <!-- Reviewer Name -->
                <label for="user">Your Name:</label>
                <input type="text" id="user" name="user" placeholder="Enter your name" required>

                <!-- Review Text -->
                <label for="review">Your Review:</label>
                <textarea id="review" name="review" placeholder="Write your review here..." required></textarea>

                <!-- Rating -->
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select rating</option>
                    <option value="1">1 ⭐</option>
                    <option value="2">2 ⭐⭐</option>
                    <option value="3">3 ⭐⭐⭐</option>
                    <option value="4">4 ⭐⭐⭐⭐</option>
                    <option value="5">5 ⭐⭐⭐⭐⭐</option>
                </select>

                <!-- Submit -->
                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>All rights reserved</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
